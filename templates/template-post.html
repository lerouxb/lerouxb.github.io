<div class="post">
  <div class="post-header">
    ${source ? `
    <span class="post-source post-source-${source}">${source}</span>
    ` : ''}
    <a href="${permalink}"
      ><time datetime="${datetimeISO}">${datetimeReadable}</time></a
    >
    ${title ? `
    <h1 class="post-title">${title}</h1>
    ` : ''}
  </div>

  ${content}
</div>
